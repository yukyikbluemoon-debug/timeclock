<script>
// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const S = {
  apiUrl: '',
  user: null,
  records: [],
  gps: null,
  isIn: false,
  inTime: null,
  inRowIdx: null,
  calMonth: new Date(),
  locSettings: { radius: 500 },
  sheetUrl: ''
};

// ═══════════════════════════════════════════════════
// API CALLER — ✅ ฟังก์ชันเดียวที่ใช้ได้ทั้งระบบ
// ═══════════════════════════════════════════════════
async function api(action, body = {}) {
  const url = S.apiUrl || document.getElementById('api-url-inp')?.value.trim();
  if (!url) { 
    toast('กรุณาใส่ Apps Script URL ก่อน', 'err'); 
    throw new Error('No API URL configured'); 
  }
  S.apiUrl = url;
  localStorage.setItem('tc_api', url);

  // ✅ ส่งแบบ JSON โดยไม่ใส่ headers เพื่อเลี่ยง CORS Preflight
  const res = await fetch(url, {
    method: 'POST',
    body: JSON.stringify({ action, ...body })
  });
  
  if (!res.ok) {
    throw new Error(`HTTP ${res.status}: ${res.statusText}`);
  }
  
  return await res.json();
}

// ═══════════════════════════════════════════════════
// DATE HELPERS
// ═══════════════════════════════════════════════════
function normalizeDate(val) {
  if (!val && val !== 0) return '';
  if (typeof val === 'string' && /^\d{2}\/\d{2}\/\d{4}$/.test(val.trim())) {
    return val.trim();
  }
  try {
    const d = new Date(val);
    if (!isNaN(d.getTime())) {
      const day = String(d.getDate()).padStart(2, '0');
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const year = d.getFullYear();
      return `${day}/${month}/${year}`;
    }
  } catch (e) { console.warn('normalizeDate error:', e, val); }
  return String(val).trim();
}

function fmtDate(d) {
  if (!d) return '';
  const date = d instanceof Date ? d : new Date(d);
  if (isNaN(date.getTime())) return '';
  return `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}/${date.getFullYear()}`;
}

function toInputDate(s) {
  if (!s) return '';
  const parts = normalizeDate(s).split('/');
  if (parts.length !== 3) return '';
  const [d, m, y] = parts.map(Number);
  return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
}

function parseDate(s) {
  const parts = normalizeDate(s).split('/');
  if (parts.length !== 3) return null;
  const [d, m, y] = parts.map(Number);
  return new Date(y, m - 1, d);
}

function calcH(ci, co) {
  if (!ci || !co) return 0;
  const cleanCI = String(ci).trim();
  const cleanCO = String(co).trim();
  if (!/^\d{2}:\d{2}$/.test(cleanCI) || !/^\d{2}:\d{2}$/.test(cleanCO)) return 0;
  const [hi, mi] = cleanCI.split(':').map(Number);
  const [ho, mo] = cleanCO.split(':').map(Number);
  let diff = (ho * 60 + mo) - (hi * 60 + mi);
  if (diff < 0) diff += 1440;
  if (diff === 0 || diff > 1200) return 0;
  return diff / 60;
}

function cycleRange() {
  const n = new Date(); const cut = 7;
  let sy, sm, ey, em;
  if (n.getDate() >= cut) { sy = n.getFullYear(); sm = n.getMonth(); ey = n.getFullYear(); em = n.getMonth() + 1; }
  else { const p = new Date(n.getFullYear(), n.getMonth() - 1, 1); sy = p.getFullYear(); sm = p.getMonth(); ey = n.getFullYear(); em = n.getMonth(); }
  return { start: new Date(sy, sm, cut), end: new Date(ey, em, cut - 1) };
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
window.addEventListener('load', () => {
  S.apiUrl = localStorage.getItem('tc_api') || '';
  if (S.apiUrl) document.getElementById('api-url-inp').value = S.apiUrl;
  else document.getElementById('api-warn').style.display = 'block';

  const u = localStorage.getItem('tc_user');
  if (u) {
    try {
      S.user = JSON.parse(u);
      S.sheetUrl = localStorage.getItem('tc_sheet_url') || '';
      startApp();
    } catch (e) { console.error('Parse user error:', e); }
  }

  setTodayMonth();
  startClock();
  initOffline();
  initGPS();
});

function setTodayMonth() {
  const n = new Date();
  const monthVal = `${n.getFullYear()}-${String(n.getMonth() + 1).padStart(2, '0')}`;
  const input = document.getElementById('hist-month');
  if (input) input.value = monthVal;
  return monthVal;
}

// ═══════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════
function switchTab(t) {
  document.getElementById('tab-login').classList.toggle('on', t === 'login');
  document.getElementById('tab-reg').classList.toggle('on', t === 'reg');
  document.getElementById('form-login').style.display = t === 'login' ? 'flex' : 'none';
  document.getElementById('form-reg').style.display = t === 'reg' ? 'flex' : 'none';
}

async function doLogin() {
  const uid = v('l-uid'), pin = v('l-pin');
  if (!uid || !pin) { toast('กรอก UserID และ PIN', 'err'); return; }
  try {
    const r = await api('login', { userId: uid, pin });
    if (!r.ok) { toast(r.error || 'ล็อกอินล้มเหลว', 'err'); return; }
    S.user = r.user;
    S.sheetUrl = r.sheetUrl || '';
    localStorage.setItem('tc_user', JSON.stringify(S.user));
    localStorage.setItem('tc_sheet_url', S.sheetUrl);
    document.getElementById('l-pin').value = '';
    startApp();
  } catch (e) {
    console.error('Login error:', e);
    toast('เชื่อมต่อล้มเหลว: ' + e.message, 'err');
  }
}

async function doRegister() {
  const uid = v('r-uid'), pin = v('r-pin');
  if (!uid) { toast('กรุณาระบุ UserID', 'err'); return; }
  if (!/^\d{4}$/.test(pin)) { toast('PIN ต้องเป็นตัวเลข 4 หลัก', 'err'); return; }
  try {
    const r = await api('register', {
      userId: uid, pin,
      firstname: v('r-fn'), lastname: v('r-ln'),
      empType: document.getElementById('r-type').value,
      shift: document.getElementById('r-shift').value,
      wage: v('r-wage')
    });
    if (!r.ok) { toast(r.error || 'สมัครล้มเหลว', 'err'); return; }
    toast('สมัครสำเร็จ! เข้าสู่ระบบได้เลย', 'ok');
    switchTab('login');
    document.getElementById('l-uid').value = uid;
    document.getElementById('r-pin').value = '';
  } catch (e) {
    console.error('Register error:', e);
    toast('เชื่อมต่อล้มเหลว: ' + e.message, 'err');
  }
}

function doLogout() {
  localStorage.removeItem('tc_user');
  localStorage.removeItem('tc_sheet_url');
  localStorage.removeItem('tc_in');
  S.user = null; S.records = []; S.isIn = false; S.inTime = null; S.inRowIdx = null;
  document.getElementById('s-app').classList.remove('show');
  document.getElementById('s-login').classList.add('show');
}

// ═══════════════════════════════════════════════════
// START APP
// ═══════════════════════════════════════════════════
function startApp() {
  document.getElementById('s-login').classList.remove('show');
  document.getElementById('s-app').classList.add('show');
  const u = S.user;
  const name = [u.firstname, u.lastname].filter(Boolean).join(' ') || u.userId;
  document.getElementById('tb-name').textContent = name;
  document.getElementById('tb-uid').textContent = u.userId;
  document.getElementById('av-init').textContent = (u.firstname?.[0] || u.userId?.[0] || '?').toUpperCase();
  restoreInState();
  loadRecords();
  loadLocSettings();
}

// ═══════════════════════════════════════════════════
// GPS
// ═══════════════════════════════════════════════════
function initGPS() {
  if (!navigator.geolocation) { document.getElementById('gps-name').textContent = 'GPS ไม่รองรับ'; return; }
  navigator.geolocation.watchPosition(onGPS, (err) => {
    console.warn('GPS error:', err);
    document.getElementById('gps-name').textContent = 'ดึง GPS ไม่ได้';
    document.getElementById('gps-ico').textContent = '📡';
  }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 });
}

async function onGPS(pos) {
  S.gps = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy };
  document.getElementById('gps-coord').textContent = `${S.gps.lat.toFixed(5)}, ${S.gps.lng.toFixed(5)}  (±${Math.round(S.gps.acc)}m)`;
  document.getElementById('gps-ico').textContent = '📍';
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${S.gps.lat}&lon=${S.gps.lng}&format=json&accept-language=th`);
    const d = await r.json();
    const a = d.address;
    const place = [a.road || a.pedestrian, a.suburb || a.neighbourhood, a.city || a.town || a.village].filter(Boolean).join(', ');
    document.getElementById('gps-name').textContent = place || d.display_name?.split(',')[0] || 'ไม่ระบุสถานที่';
  } catch (e) {
    console.warn('Geocoding error:', e);
    document.getElementById('gps-name').textContent = `${S.gps.lat.toFixed(4)}, ${S.gps.lng.toFixed(4)}`;
  }
  const ls = S.locSettings;
  if (ls.workplaceLat && ls.workplaceLng) {
    const d = haversine(S.gps.lat, S.gps.lng, +ls.workplaceLat, +ls.workplaceLng);
    const ok = d <= (ls.radius || 500);
    document.getElementById('gps-dist').innerHTML = ok ? `<span style="color:var(--teal)">✅ ${Math.round(d)}m</span>` : `<span style="color:var(--red)">❌ ${Math.round(d)}m</span>`;
  }
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2) ** 2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function checkRadius() {
  const ls = S.locSettings;
  if (!ls.workplaceLat && !ls.workplaceLng) return true;
  if (!S.gps) { toast('ยังไม่ได้ดึงตำแหน่ง GPS', 'err'); return false; }
  const d = haversine(S.gps.lat, S.gps.lng, +ls.workplaceLat, +ls.workplaceLng);
  if (d > (ls.radius || 500)) { toast(`อยู่นอกรัศมีอนุญาต (${Math.round(d)}m > ${ls.radius}m)`, 'err'); return false; }
  return true;
}

// ═══════════════════════════════════════════════════
// RECORD
// ═══════════════════════════════════════════════════
async function doRecord(type) {
  const now = new Date();
  const dateStr = fmtDate(now);
  const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', hour12: false });
  const note = document.getElementById('note').value.trim();

  if (type === 'checkin') {
    if (S.isIn) { toast('คุณเข้างานแล้ว ต้องออกงานก่อน', 'err'); return; }
    if (!checkRadius()) return;
    const status = isLate(now) ? 'สาย' : 'ปกติ';
    try {
      const r = await api('addRecord', { userId: S.user.userId, date: dateStr, checkin: timeStr, lat: S.gps?.lat || '', lng: S.gps?.lng || '', place: document.getElementById('gps-name').textContent, note, status });
      if (!r.ok) { toast(r.error || 'บันทึกเข้างานล้มเหลว', 'err'); return; }
      S.isIn = true; S.inTime = now; S.inRowIdx = r.rowIndex;
      localStorage.setItem('tc_in', JSON.stringify({ time: now.toISOString(), rowIndex: r.rowIndex }));
      document.getElementById('note').value = '';
      toast('บันทึกเข้างานสำเร็จ ✅', 'ok');
    } catch (e) { console.error('Check-in error:', e); toast('เชื่อมต่อล้มเหลว: ' + e.message, 'err'); return; }
  } else if (type === 'checkout') {
    if (!S.isIn) { toast('ยังไม่ได้เข้างาน', 'err'); return; }
    if (!checkRadius()) return;
    try {
      const r = await api('updateCheckout', { userId: S.user.userId, rowIndex: S.inRowIdx, checkout: timeStr, note });
      if (!r.ok) { toast(r.error || 'บันทึกออกงานล้มเหลว', 'err'); return; }
      S.isIn = false; S.inTime = null; S.inRowIdx = null;
      localStorage.removeItem('tc_in');
      document.getElementById('note').value = '';
      toast('บันทึกออกงานสำเร็จ 🔚', 'ok');
    } catch (e) { console.error('Check-out error:', e); toast('เชื่อมต่อล้มเหลว: ' + e.message, 'err'); return; }
  } else {
    const statusMap = { leave: 'ลาหยุด', sick: 'ลาป่วย' };
    const statusText = statusMap[type] || type;
    try {
      const r = await api('addRecord', { userId: S.user.userId, date: dateStr, checkin: '', checkout: '', lat: S.gps?.lat || '', lng: S.gps?.lng || '', place: document.getElementById('gps-name').textContent, note, status: statusText });
      if (!r.ok) { toast(r.error || `บันทึก${statusText}ล้มเหลว`, 'err'); return; }
      document.getElementById('note').value = '';
      toast(`บันทึก${statusText}สำเร็จ ✅`, 'ok');
    } catch (e) { console.error('Leave record error:', e); toast('เชื่อมต่อล้มเหลว: ' + e.message, 'err'); return; }
  }
  updateClockStatus();
  await loadRecords();
}

function isLate(now) {
  const u = S.user;
  const times = shiftTimes(u.empType || 'normal', u.shift || 'day');
  const [h, m] = times.start.split(':').map(Number);
  const limit = new Date(now); limit.setHours(h, m, 0, 0);
  return now > limit;
}

function shiftTimes(empType, shift) {
  const map = {
    normal: { day: { start: '06:00', end: '18:00' }, night: { start: '18:00', end: '06:00' } },
    cashier: { day: { start: '07:00', end: '19:00' }, night: { start: '19:00', end: '07:00' } }
  };
  return map[empType]?.[shift] || { start: '08:00', end: '17:00' };
}

function restoreInState() {
  const saved = localStorage.getItem('tc_in');
  if (!saved) return;
  try {
    const d = JSON.parse(saved);
    const t = new Date(d.time);
    if ((new Date() - t) < 24 * 60 * 60 * 1000) { S.isIn = true; S.inTime = t; S.inRowIdx = d.rowIndex; }
    else { localStorage.removeItem('tc_in'); }
  } catch (e) { console.warn('Restore in-state error:', e); localStorage.removeItem('tc_in'); }
  updateClockStatus();
}

function updateClockStatus() {
  const area = document.getElementById('status-area');
  const chip = document.getElementById('today-chip');
  if (S.isIn && S.inTime) {
    area.innerHTML = '<span class="status-pill pill-in"><span class="dot"></span>กำลังทำงาน</span>';
    chip.style.display = 'block';
    const tick = () => { const mins = (new Date() - S.inTime) / 60000; document.getElementById('chip-val').textContent = `${Math.floor(mins / 60)} ชม. ${Math.floor(mins % 60)} นาที`; };
    tick(); if (window._chipTimer) clearInterval(window._chipTimer); window._chipTimer = setInterval(tick, 30000);
  } else {
    area.innerHTML = '<span class="status-pill pill-out">ยังไม่ได้เข้างาน</span>';
    chip.style.display = 'none';
    if (window._chipTimer) clearInterval(window._chipTimer);
  }
  document.getElementById('btn-in').classList.toggle('disabled', S.isIn);
  document.getElementById('btn-out').classList.toggle('disabled', !S.isIn);
}

// ═══════════════════════════════════════════════════
// LOAD & RENDER
// ═══════════════════════════════════════════════════
async function loadRecords() {
  if (!S.user) return;
  const histBody = document.getElementById('hist-body');
  if (histBody) histBody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:1.5rem"><span class="spin"></span> กำลังโหลด...</td></tr>';
  try {
    const r = await api('getRecords', { userId: S.user.userId });
    if (r.ok) {
      S.records = (r.records || []).map(rec => ({ ...rec, date: normalizeDate(rec.date), checkin: String(rec.checkin || '').trim(), checkout: String(rec.checkout || '').trim(), lat: String(rec.lat || '').trim(), lng: String(rec.lng || '').trim(), place: String(rec.place || '').trim(), note: String(rec.note || '').trim(), status: String(rec.status || 'ปกติ').trim() }));
      console.log('✅ Loaded records:', S.records.length);
      renderAll();
    } else { console.error('❌ API error:', r.error); toast('โหลดข้อมูลล้มเหลว: ' + (r.error || 'ไม่ทราบสาเหตุ'), 'err'); }
  } catch (e) { console.error('❌ Fetch error:', e); toast('เชื่อมต่อเซิร์ฟเวอร์ล้มเหลว: ' + e.message, 'err'); }
}

async function loadLocSettings() {
  if (!S.user) return;
  try {
    const r = await api('getSettings', { userId: S.user.userId });
    if (r.ok) S.locSettings = { radius: r.settings?.radius || 500, workplace: r.settings?.workplace || '', workplaceLat: r.settings?.workplaceLat || '', workplaceLng: r.settings?.workplaceLng || '' };
  } catch (e) { console.warn('Load settings error:', e); }
}

function renderAll() { renderHist(); renderDash(); renderCal(); updateClockStatus(); }

function renderHist() {
  const mv = document.getElementById('hist-month')?.value;
  if (!mv) return;
  const [fy, fm] = mv.split('-').map(Number);
  const body = document.getElementById('hist-body');
  if (!body) return;
  const filtered = S.records.filter(r => {
    const dateStr = normalizeDate(r.date);
    if (!dateStr) return false;
    const parts = dateStr.split('/');
    if (parts.length !== 3) return false;
    const [, m, y] = parts.map(Number);
    return m === fm && y === fy;
  });
  if (filtered.length === 0) { body.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--mute);padding:1.5rem">ไม่มีข้อมูลในเดือนนี้</td></tr>'; return; }
  body.innerHTML = '';
  filtered.forEach(r => {
    const safeDate = normalizeDate(r.date);
    const hours = calcH(r.checkin, r.checkout);
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${safeDate}</td><td>${r.checkin || '—'}</td><td>${r.checkout || '—'}</td><td>${hours > 0 ? hours.toFixed(1) : '—'}</td><td><span class="bdg ${bdgCls(r.status)}">${r.status || 'ปกติ'}</span></td><td><span class="edit-link" onclick="openEdit(${r.rowIndex})">แก้ไข</span></td>`;
    body.appendChild(tr);
  });
}

function bdgCls(s) { const status = String(s || '').trim().toLowerCase(); if (status === 'สาย') return 'bdg-late'; if (status === 'ลาป่วย') return 'bdg-sk'; if (status === 'ลาหยุด') return 'bdg-lv'; return 'bdg-ok'; }

function renderDash() {
  const { start, end } = cycleRange();
  document.getElementById('cycle-lbl').textContent = `รอบ ${fmtDate(start)} — ${fmtDate(end)}`;
  const inCycle = S.records.filter(r => { if (!r.date || !r.checkin || !r.checkout) return false; const d = parseDate(r.date); if (!d) return false; return d >= start && d <= end; });
  const totalHours = inCycle.reduce((sum, r) => sum + calcH(r.checkin, r.checkout), 0);
  const workDays = new Set(inCycle.map(r => r.date)).size;
  const wagePerDay = S.user?.wage || 0;
  const estimatedWage = workDays * wagePerDay;
  document.getElementById('sd-days').textContent = workDays;
  document.getElementById('sd-hrs').textContent = totalHours.toFixed(1);
  document.getElementById('sd-avg').textContent = workDays ? (totalHours / workDays).toFixed(1) : '0';
  document.getElementById('sd-wage').textContent = `฿${Math.round(estimatedWage).toLocaleString('th-TH')}`;
  const dl = document.getElementById('daily-list'); if (!dl) return; dl.innerHTML = '';
  const byDate = {}; inCycle.forEach(r => { const key = normalizeDate(r.date); if (!byDate[key]) byDate[key] = []; byDate[key].push(r); });
  const sorted = Object.entries(byDate).sort((a, b) => { const da = parseDate(a[0]), db = parseDate(b[0]); return (da?.getTime() || 0) - (db?.getTime() || 0); });
  if (sorted.length === 0) { dl.innerHTML = '<div style="color:var(--mute);font-size:.82rem;text-align:center;padding:.8rem">ไม่มีข้อมูลในรอบนี้</div>'; return; }
  sorted.forEach(([date, rows]) => { const tot = rows.reduce((s, r) => s + calcH(r.checkin, r.checkout), 0); const div = document.createElement('div'); div.className = 'day-row'; div.innerHTML = `<div><div class="day-dt">${date}</div><div class="day-time">${rows[0].checkin || '—'} → ${rows[rows.length-1].checkout || '—'}</div></div><span class="h-chip">${tot.toFixed(1)} ชม.</span>`; dl.appendChild(div); });
}

function renderCal() {
  const y = S.calMonth.getFullYear(), m = S.calMonth.getMonth();
  document.getElementById('cal-lbl').textContent = S.calMonth.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });
  const grid = document.getElementById('cal-grid'); if (!grid) return; grid.innerHTML = '';
  ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'].forEach(h => { const e = document.createElement('div'); e.className = 'cal-dh'; e.textContent = h; grid.appendChild(e); });
  const firstDay = new Date(y, m, 1).getDay(); const daysInMonth = new Date(y, m + 1, 0).getDate();
  const { start: cs, end: ce } = cycleRange(); const now = new Date();
  for (let i = 0; i < firstDay; i++) { const e = document.createElement('div'); e.className = 'cal-d empty'; grid.appendChild(e); }
  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div'); el.className = 'cal-d'; el.textContent = d;
    const dt = new Date(y, m, d); const ds = fmtDate(dt);
    const rec = S.records.find(r => normalizeDate(r.date) === ds);
    if (rec) { el.classList.add('has-rec'); if (String(rec.status || '').trim() === 'สาย') el.classList.add('late'); }
    if (dt >= cs && dt <= ce) el.classList.add('cycle');
    if (d === now.getDate() && m === now.getMonth() && y === now.getFullYear()) el.classList.add('today');
    grid.appendChild(el);
  }
}
function calMove(delta) { S.calMonth = new Date(S.calMonth.getFullYear(), S.calMonth.getMonth() + delta, 1); renderCal(); }

// ═══════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════
async function loadSettingsPage() {
  if (!S.user) return;
  const u = S.user;
  document.getElementById('s-fn').value = u.firstname || ''; document.getElementById('s-ln').value = u.lastname || '';
  document.getElementById('s-wage').value = u.wage || ''; document.getElementById('s-sh').value = u.shift || 'day';
  document.querySelectorAll('[name=et]').forEach(r => { r.checked = r.value === (u.empType || 'normal'); });
  document.getElementById('opt-n').classList.toggle('sel-on', (u.empType || 'normal') === 'normal');
  document.getElementById('opt-c').classList.toggle('sel-on', u.empType === 'cashier');
  updShift();
  const sheetArea = document.getElementById('sheet-url-area'); if (sheetArea) sheetArea.textContent = S.sheetUrl ? 'Sheet พร้อมใช้งาน ✅' : '—';
  await loadLocSettings(); const ls = S.locSettings;
  document.getElementById('s-wp').value = ls.workplace || ''; document.getElementById('s-rad').value = ls.radius || 500;
  const wpCoord = document.getElementById('wp-coord'); if (wpCoord && ls.workplaceLat && ls.workplaceLng) wpCoord.textContent = `${ls.workplaceLat.toFixed(6)}, ${ls.workplaceLng.toFixed(6)}`;
}
function updShift() {
  const et = document.querySelector('[name=et]:checked')?.value || 'normal';
  document.getElementById('opt-n').classList.toggle('sel-on', et === 'normal');
  document.getElementById('opt-c').classList.toggle('sel-on', et === 'cashier');
  const sh = document.getElementById('s-sh')?.value || 'day'; const t = shiftTimes(et, sh);
  const el = document.getElementById('shift-disp'); if (el) el.textContent = `⏰ ${t.start} — ${t.end}`;
}
async function saveSettings() {
  const et = document.querySelector('[name=et]:checked')?.value || 'normal'; const sh = document.getElementById('s-sh').value;
  const fn = document.getElementById('s-fn').value.trim(); const ln = document.getElementById('s-ln').value.trim();
  const wage = parseFloat(document.getElementById('s-wage').value) || 0; const op = document.getElementById('s-pin-old').value.trim(); const np = document.getElementById('s-pin-new').value.trim();
  const body = { userId: S.user.userId, firstname: fn, lastname: ln, empType: et, shift: sh, wage };
  if (op && np) { if (!/^\d{4}$/.test(np)) { toast('PIN ใหม่ต้องเป็น 4 หลัก', 'err'); return; } body.currentPin = op; body.newPin = np; }
  try {
    const r1 = await api('updateProfile', body);
    if (!r1.ok) { toast(r1.error || 'บันทึกโปรไฟล์ล้มเหลว', 'err'); return; }
    S.user = { ...S.user, firstname: fn, lastname: ln, empType: et, shift: sh, wage };
    localStorage.setItem('tc_user', JSON.stringify(S.user));
    document.getElementById('tb-name').textContent = [fn, ln].filter(Boolean).join(' ') || S.user.userId;
  } catch (e) { console.error('Update profile error:', e); toast('บันทึกโปรไฟล์ล้มเหลว: ' + e.message, 'err'); return; }
  const wp = document.getElementById('s-wp').value.trim(); const rad = parseInt(document.getElementById('s-rad').value) || 500; const ls = S.locSettings;
  try { const r2 = await api('saveSettings', { userId: S.user.userId, workplace: wp, workplaceLat: ls.workplaceLat || '', workplaceLng: ls.workplaceLng || '', radius: rad }); if (r2.ok) S.locSettings = { ...ls, workplace: wp, radius: rad }; } catch (e) { console.warn('Save settings error:', e); }
  document.getElementById('s-pin-old').value = ''; document.getElementById('s-pin-new').value = '';
  toast('บันทึกการตั้งค่าสำเร็จ ✅', 'ok');
}
function saveWPLocation() { if (!S.gps) { toast('ยังไม่ได้ดึงตำแหน่ง GPS', 'err'); return; } S.locSettings.workplaceLat = S.gps.lat; S.locSettings.workplaceLng = S.gps.lng; const wpCoord = document.getElementById('wp-coord'); if (wpCoord) wpCoord.textContent = `${S.gps.lat.toFixed(6)}, ${S.gps.lng.toFixed(6)}`; toast('บันทึกตำแหน่งแล้ว (กด "บันทึกการตั้งค่า" เพื่อเซฟ)', 'ok'); }
function openSheet() { if (S.sheetUrl) window.open(S.sheetUrl, '_blank'); else toast('ยังไม่มีข้อมูล Sheet', 'err'); }

// ═══════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════
function doExport() {
  const mv = document.getElementById('hist-month').value; if (!mv) { toast('กรุณาเลือกเดือนก่อน Export', 'err'); return; }
  const [fy, fm] = mv.split('-').map(Number); const u = S.user; const name = [u.firstname, u.lastname].filter(Boolean).join(' ') || u.userId;
  const filtered = S.records.filter(r => { const dateStr = normalizeDate(r.date); if (!dateStr) return false; const [, m, y] = dateStr.split('/').map(Number); return m === fm && y === fy; });
  let csv = `ชื่อ,${name}\nรอบ,${fm === 1 ? 12 : fm - 1}/${fy} – ${fm}/${fy}\n\n`; csv += 'วันที่,เข้างาน,ออกงาน,รวม ชม.,สถานที่,หมายเหตุ,สถานะ\n';
  filtered.forEach(r => { csv += `${normalizeDate(r.date)},${r.checkin || ''},${r.checkout || ''},${calcH(r.checkin, r.checkout).toFixed(2)},${r.place || ''},${r.note || ''},${r.status || ''}\n`; });
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `timeclock_${fy}_${String(fm).padStart(2, '0')}.csv`; a.click(); URL.revokeObjectURL(a.href);
  toast('Export CSV สำเร็จ ✅', 'ok');
}

function goPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));

}
function startClock() {
  const t = document.getElementById('live-t'), d = document.getElementById('live-d'); if (!t || !d) return;
  const tick = () => { const n = new Date(); t.textContent = n.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false }); d.textContent = n.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }); };
  tick(); setInterval(tick, 1000);
}
function initOffline() { const bar = document.getElementById('offline-bar'); if (!bar) return; window.addEventListener('offline', () => { bar.style.display = 'block'; }); window.addEventListener('online', () => { bar.style.display = 'none'; }); if (!navigator.onLine) bar.style.display = 'block'; }
function v(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
let _toastTimer;
function toast(msg, cls = 'ok') { const el = document.getElementById('toast'); if (!el) return; el.textContent = msg; el.className = `show ${cls}`; clearTimeout(_toastTimer); _toastTimer = setTimeout(() => { el.className = ''; }, 3000); }
